name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v --tb=short

  lint:
    name: Lint proto
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install grpcio-tools
        run: pip install grpcio-tools==1.62.1

      - name: Verify proto compiles cleanly
        run: |
          python3 -m grpc_tools.protoc \
            -I proto \
            --python_out=/tmp \
            --grpc_python_out=/tmp \
            proto/emotion.proto
