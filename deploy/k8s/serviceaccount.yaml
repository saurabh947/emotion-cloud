# Kubernetes ServiceAccount bound to a GCP service account via Workload Identity.
#
# Setup (one-time):
#   gcloud iam service-accounts create emotion-cloud-sa \
#     --project=PROJECT_ID
#
#   gcloud projects add-iam-policy-binding PROJECT_ID \
#     --member="serviceAccount:emotion-cloud-sa@PROJECT_ID.iam.gserviceaccount.com" \
#     --role="roles/storage.objectViewer"
#
#   gcloud iam service-accounts add-iam-policy-binding \
#     emotion-cloud-sa@PROJECT_ID.iam.gserviceaccount.com \
#     --role="roles/iam.workloadIdentityUser" \
#     --member="serviceAccount:PROJECT_ID.svc.id.goog[default/emotion-cloud-sa]"
#
# Then apply this manifest.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: emotion-cloud-sa
  namespace: default
  annotations:
    # Binds the Kubernetes SA to the GCP SA via Workload Identity Federation.
    iam.gke.io/gcp-service-account: emotion-cloud-sa@PROJECT_ID.iam.gserviceaccount.com
