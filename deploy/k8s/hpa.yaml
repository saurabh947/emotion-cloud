apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: emotion-cloud-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: emotion-cloud

  # Single-tenant startup: 1 pod is enough.
  # Upper bound: 5 pods × 1 T4 each.  Revisit when you track real QPS.
  minReplicas: 1
  maxReplicas: 5

  metrics:
    # Scale on CPU utilization.  GPU-utilization-based scaling requires
    # a custom metrics adapter (e.g. DCGM Exporter + Prometheus Adapter).
    # Add that when CPU stops being a reliable proxy for GPU load.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # conservative — GPU inference is bursty

    # Memory pressure as a secondary signal.
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      # Scale out quickly when load spikes (robot session burst).
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      # Scale in slowly — GPU pods are expensive to restart (model load time).
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
