apiVersion: v1
kind: Service
metadata:
  name: emotion-cloud-grpc
  namespace: default
  labels:
    app: emotion-cloud
  annotations:
    # Cloud.google.com/load-balancer-type: External creates a regional TCP LB.
    # For internal-only access (robot on the same VPC), switch to "Internal".
    cloud.google.com/load-balancer-type: "External"
spec:
  type: LoadBalancer
  selector:
    app: emotion-cloud
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
  # Session affinity: route all frames from the same robot to the same pod.
  # Critical for stateful streaming — ensures the 16-frame rolling buffer
  # stays on one EmotionDetector instance for the lifetime of the session.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600    # 1 hour — longer than any realistic robot session
