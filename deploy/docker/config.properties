# TorchServe configuration
# https://pytorch.org/serve/configuration.html

# Bind only to loopback — the gRPC server is the public face.
inference_address=http://127.0.0.1:8080
management_address=http://127.0.0.1:8081
metrics_address=http://127.0.0.1:8082

# Number of GPU workers for the emotion-detector model.
# One worker per T4 GPU (GKE node has 1 GPU → 1 worker).
default_workers_per_model=1

# Max concurrent requests per worker.
# Streaming sessions call TorchServe sequentially per frame, so
# a small batch size is fine.  Increase if you add cross-session batching.
batch_size=1
max_batch_delay=50

# Request/response size limits (bytes).
# Max video frame: 1920×1080×3 = ~6 MB.  Set headroom to 10 MB.
max_request_size=10485760
max_response_size=10485760

# Keep TorchServe logs terse — our gRPC server does the structured logging.
vmargs=-Dlog4j.configurationFile=/opt/ml/config/log4j2.xml

# Disable config snapshot persistence (not useful in containers).
enable_envvars_config=true
